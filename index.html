<!DOCTYPE html>
<html>
<head>
<title>Guess The Word Game</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#eef2f7;
margin-top:40px;
}

h1{
color:#333;
}

#game,#result{
display:none;
}

input{
padding:10px;
font-size:16px;
margin:10px;
}

button{
padding:10px 20px;
font-size:16px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

#hint{
font-size:20px;
margin:20px;
color:#444;
}

#score{
font-size:18px;
margin:10px;
color:green;
}
</style>

</head>

<body>

<h1>Guess The Word 🎮</h1>

<div id="start">
<p>Enter Your Name</p>
<input id="playerName">
<br>
<button onclick="startGame()">Start Game</button>
</div>

<div id="game">
<h2 id="welcome"></h2>

<p id="score">Score: 0</p>

<p id="hint"></p>

<input id="guess" placeholder="Type your guess">

<br>

<button onclick="checkGuess()">Submit</button>

</div>

<div id="result">
<h2 id="final"></h2>
<p id="wrongWords"></p>
</div>

<audio id="music" autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b7c7cce9.mp3" type="audio/mp3">
</audio>

<script>

let words=[
{word:"apple",hint:"Red or green fruit"},
{word:"mango",hint:"King of fruits"},
{word:"tiger",hint:"Big wild animal"},
{word:"phone",hint:"Used for calling"},
{word:"table",hint:"Furniture used for study"},
{word:"pencil",hint:"Used for writing"},
{word:"banana",hint:"Yellow fruit"},
{word:"doctor",hint:"Treats patients"},
{word:"school",hint:"Place to study"},
{word:"river",hint:"Natural water flow"},
{word:"train",hint:"Runs on railway"}
];

let shuffled=[];
let index=0;
let score=0;
let wrongList=[];

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

function startGame(){

let name=document.getElementById("playerName").value;

if(name==""){
alert("Enter your name");
return;
}

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("welcome").innerHTML="Hello "+name;

shuffled=shuffle(words);

showWord();
}

function showWord(){

if(index>=10){
endGame();
return;
}

document.getElementById("hint").innerHTML=
"Hint: "+shuffled[index].hint;

document.getElementById("guess").value="";
}

function checkGuess(){

let guess=document.getElementById("guess").value.toLowerCase();

if(guess===shuffled[index].word){
score++;
}

else{
wrongList.push(
shuffled[index].word
);
}

index++;

document.getElementById("score").innerHTML=
"Score: "+score;

showWord();
}

function endGame(){

document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("final").innerHTML=
"Final Score: "+score+"/10";

if(wrongList.length>0){
document.getElementById("wrongWords").innerHTML=
"Correct words you missed: "+wrongList.join(", ");
}

}

</script>

</body>
</html>
